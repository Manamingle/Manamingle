<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ManaMingle – Group Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#04060a">

<!-- Improved CSP -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self' https://cdn.socket.io https://fonts.googleapis.com https://ipapi.co;
  script-src 'self' 'unsafe-inline' https://cdn.socket.io https://unpkg.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  connect-src 'self' ws: wss: https://cdn.socket.io;
  img-src 'self' data: blob: https:;
  media-src 'self' blob: mediastream:;
  object-src 'none';
">

<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#04060a;
  --card:#0c1220;
  --accent:#00c6ff;
  --green:#00d19a;
  --danger:#ff7675;
  --orange:#ff9f43;
  --vip:#ffd700;
  --border:rgba(255,255,255,0.15);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
  font-family:'Baloo Tamma 2',cursive;
  background:var(--bg);
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  overflow:hidden;
  position:relative;
  -webkit-font-smoothing:antialiased;
}

/* 3D Background Animation */
.background-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

.animation-particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent), transparent 70%);
  animation: float 15s infinite linear;
  opacity: 0.2;
}

@keyframes float {
  0% {
    transform: translate(0, 0) rotate(0deg);
  }
  100% {
    transform: translate(100vw, 100vh) rotate(360deg);
  }
}

/* Watermark */
.watermark {
  position: absolute;
  bottom: 10px;
  right: 10px;
  color: rgba(255,255,255,0.3);
  font-size: 0.7rem;
  z-index: 1;
  pointer-events: none;
}

.video-watermark {
  position: absolute;
  bottom: 5px;
  right: 5px;
  color: rgba(255,255,255,0.4);
  font-size: 0.6rem;
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
  z-index: 5;
  pointer-events: none;
}

/* ===== START CARD ===== */
.start-overlay{
  position:fixed;
  inset:0;
  background:rgba(4,6,10,.98);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  animation:fadeIn .5s ease;
  padding:20px;
  touch-action:manipulation;
}

.start-card{
  background:linear-gradient(145deg,#0c1220,#060a14);
  border-radius:20px;
  padding:30px 25px;
  width:100%;
  max-width:320px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,198,255,.25);
  animation:popIn .5s ease;
  border:1px solid var(--border);
  position:relative;
  z-index:2;
}

.start-card h1{
  margin-bottom:20px;
  font-size:1.8rem;
  background: linear-gradient(45deg, #00c6ff, #00d19a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height:1.3;
}

.start-card button{
  width:100%;
  margin-top:12px;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  transition:all 0.3s ease;
  font-family:'Baloo Tamma 2',cursive;
  font-weight:600;
  border:1px solid rgba(0,198,255,0.3);
  position:relative;
  overflow:hidden;
  touch-action:manipulation;
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.start-card button::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.start-card button:active::after {
  width: 300px;
  height: 300px;
}

.start-card button:active{
  transform:scale(0.98);
}

.home-btn {
  background: rgba(255,255,255,0.08) !important;
  border: 1px solid rgba(255,255,255,0.2) !important;
  margin-top: 18px;
}

.home-btn:active {
  background: rgba(255,255,255,0.15) !important;
}

@keyframes popIn{
  from{opacity:0;transform:scale(.9)}
  to{opacity:1;transform:scale(1)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* Button animations */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.pulse-animation {
  animation: pulse 2s infinite;
}

/* ===== MAIN APP CONTAINER ===== */
.app{
  width:100%;
  height:100vh;
  background:rgba(255,255,255,.04);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  display:none;
  position:relative;
  z-index:2;
}

/* ===== HEADER ===== */
.header{
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.3);
  flex-shrink:0;
  min-height:60px;
}

.header h1{
  font-size:1.4rem;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-right:10px;
  flex:1;
}

/* VIP Badge */
.vip-badge {
  background: linear-gradient(45deg, #ffd700, #ff9900);
  color: #000;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: bold;
  margin-left: 8px;
  display: inline-block;
}

/* ===== INVITE BAR ===== */
.invite-bar{
  display:flex;
  align-items:center;
  gap:8px;
  justify-content:flex-end;
}

.invite-bar input{
  flex:1;
  min-width:0;
  padding:8px 12px;
  border-radius:12px;
  border:1px solid rgba(0,198,255,.6);
  background:rgba(0,0,0,.45);
  color:#00eaff;
  font-size:0.8rem;
  outline:none;
  font-family:'Baloo Tamma 2',cursive;
  max-width:200px;
  display:none;
}

.invite-bar button{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  font-size:0.9rem;
  white-space:nowrap;
  flex-shrink:0;
  font-family:'Baloo Tamma 2',cursive;
  transition:transform 0.2s ease;
  border:1px solid rgba(0,198,255,0.3);
  min-height:44px;
  min-width:44px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.invite-bar button:active{
  transform:scale(0.95);
}

/* ===== BACK BUTTON ===== */
.back-btn{
  background:rgba(0,0,0,.55);
  border:1px solid var(--border);
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:0.8rem;
  font-family:'Baloo Tamma 2',cursive;
  transition:all 0.2s ease;
  display:flex;
  align-items:center;
  gap:4px;
  flex-shrink:0;
  min-height:44px;
  min-width:44px;
}

.back-btn:active{
  background:rgba(255,118,117,.85);
}

/* ===== MODE SELECTION ===== */
.mode-select{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.mode-btn{
  width:100%;
  max-width:280px;
  padding:18px;
  border-radius:16px;
  border:none;
  cursor:pointer;
  font-size:1rem;
  color:white;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  transition:all 0.3s ease;
  font-family:'Baloo Tamma 2',cursive;
  font-weight:600;
  border:1px solid rgba(0,198,255,0.3);
  position:relative;
  overflow:hidden;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  touch-action:manipulation;
}

.mode-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.mode-btn:active::after {
  width: 300px;
  height: 300px;
}

.mode-btn:active{
  transform:scale(0.98);
}

/* ===== TEXT CHAT ===== */
.text-chat{
  display:none;
  flex:1;
  flex-direction:column;
  min-height:0;
}

.chat-messages{
  flex:1;
  padding:16px;
  overflow-y:auto;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  gap:10px;
  -webkit-overflow-scrolling:touch;
}

.msg{
  max-width:85%;
  padding:12px 16px;
  border-radius:16px;
  word-wrap:break-word;
  line-height:1.4;
  animation:fadeIn 0.3s ease;
  position:relative;
  font-size:0.95rem;
}

.me{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  align-self:flex-end;
  margin-left:auto;
}

.other{
  background:rgba(255,255,255,.1);
  align-self:flex-start;
}

.chat-input{
  display:flex;
  gap:10px;
  padding:12px 16px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.2);
  flex-shrink:0;
  align-items:center;
}

.chat-input input{
  flex:1;
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:1rem;
  font-family:'Baloo Tamma 2',cursive;
  outline:none;
  min-height:44px;
}

.chat-input input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,198,255,0.1);
}

.chat-input button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:var(--green);
  color:white;
  cursor:pointer;
  font-family:'Baloo Tamma 2',cursive;
  font-weight:600;
  transition:transform 0.2s ease;
  flex-shrink:0;
  border:1px solid rgba(0,209,154,0.3);
  min-height:44px;
  min-width:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.chat-input button:active{
  transform:scale(0.95);
}

/* ===== VIDEO CHAT ===== */
.video-chat{
  display:none;
  flex:1;
  flex-direction:column;
  min-height:0;
}

/* Video Grid */
.video-grid{
  flex:1;
  padding:12px;
  display:grid;
  gap:12px;
  min-height:0;
  min-width:0;
  position:relative;
  background: rgba(0,0,0,0.2);
}

/* Video Card */
.video-card{
  position:relative;
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  min-height:0;
  min-width:0;
  background: #000;
}

.video-card video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
  min-height:0;
  min-width:0;
  flex:1;
  display:block;
  transform: scaleX(1);
}

.video-card.me video{
  transform: scaleX(-1);
}

/* Video placeholder */
.video-placeholder {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0c1220, #060a14);
  color: rgba(255,255,255,0.5);
  font-size: 1rem;
  z-index: 1;
}

.video-placeholder i {
  font-size: 2rem;
  margin-bottom: 10px;
  color: var(--accent);
}

/* Speaking indicator */
.video-card.speaking{
  box-shadow:0 0 25px rgba(0,209,154,.9);
  border-color:var(--green);
}

/* Video Controls */
.video-controls{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  background:rgba(0,0,0,0.7);
  padding:8px 12px;
  border-radius:12px;
  backdrop-filter:blur(10px);
  z-index:10;
  border:1px solid var(--border);
}

.ctrl-btn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:1rem;
  transition:all 0.2s ease;
  min-width:44px;
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
}

.ctrl-btn:active{
  background:rgba(255,255,255,0.2);
  transform:scale(0.95);
}

.ctrl-btn.off{
  background:rgba(255,118,117,.85);
  border-color:var(--danger);
}

.video-header{
  padding:12px 16px;
  display:flex;
  justify-content:center;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.2);
  flex-shrink:0;
  min-height:60px;
  align-items:center;
}

/* Video label */
.video-label{
  position:absolute;
  top:8px;
  left:8px;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:4px 10px;
  border-radius:8px;
  font-size:0.8rem;
  z-index:5;
  max-width:80%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding:20px;
  backdrop-filter:blur(5px);
  touch-action:manipulation;
}

.modal-box{
  background:#0c1220;
  padding:24px;
  border-radius:16px;
  width:100%;
  max-width:320px;
  border:1px solid var(--border);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:popIn 0.3s ease;
}

.modal-box h3{
  margin-bottom:16px;
  font-size:1.3rem;
  text-align:center;
}

.modal-box input{
  width:100%;
  padding:14px 16px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:1rem;
  font-family:'Baloo Tamma 2',cursive;
  outline:none;
  min-height:44px;
}

.modal-box input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,198,255,0.1);
}

.modal-box button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  font-size:1rem;
  font-family:'Baloo Tamma 2',cursive;
  font-weight:600;
  transition:transform 0.2s ease;
  border:1px solid rgba(0,198,255,0.3);
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box button:active{
  transform:scale(0.98);
}

/* VIP Modal */
.vip-modal .modal-box {
  max-width: 380px;
}

.vip-feature {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
  padding: 10px;
  background: rgba(255, 215, 0, 0.1);
  border-radius: 8px;
  font-size: 0.9rem;
}

.vip-price {
  text-align: center;
  font-size: 1.5rem;
  color: var(--vip);
  margin: 15px 0;
}

.vip-btn {
  background: linear-gradient(45deg, #ffd700, #ff9900) !important;
  color: #000 !important;
  font-weight: bold !important;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 480px) {
  .start-card{
    padding:25px 20px;
    max-width:90%;
    border-radius:16px;
  }
  
  .start-card h1{
    font-size:1.5rem;
  }
  
  .start-card button{
    padding:14px;
    font-size:0.95rem;
    min-height:52px;
  }
  
  .header{
    padding:10px 12px;
    min-height:56px;
  }
  
  .header h1{
    font-size:1.1rem;
    flex:1;
    min-width:0;
  }
  
  .invite-bar{
    flex:0 0 auto;
  }
  
  .invite-bar button{
    padding:8px;
    min-width:40px;
    min-height:40px;
    font-size:0.8rem;
  }
  
  .back-btn{
    padding:8px;
    min-width:40px;
    min-height:40px;
    font-size:0.8rem;
  }
  
  .video-grid{
    padding:8px;
    gap:8px;
  }
  
  .video-controls{
    bottom:8px;
    padding:6px 10px;
    gap:6px;
  }
  
  .ctrl-btn{
    padding:8px;
    min-width:40px;
    min-height:40px;
    font-size:0.9rem;
  }
  
  .chat-input{
    padding:10px 12px;
    gap:8px;
  }
  
  .chat-input input{
    padding:10px 14px;
    font-size:16px;
    min-height:44px;
  }
  
  .chat-input button{
    padding:10px 16px;
    min-width:60px;
    min-height:44px;
  }
  
  .msg{
    max-width:90%;
    padding:10px 14px;
    font-size:0.9rem;
  }
  
  .modal-box{
    padding:20px;
    max-width:90%;
  }
}

@media (max-width: 360px) {
  .start-card{
    padding:20px 16px;
  }
  
  .start-card h1{
    font-size:1.3rem;
  }
  
  .header h1{
    font-size:1rem;
  }
  
  .video-controls{
    gap:4px;
  }
  
  .ctrl-btn{
    min-width:36px;
    min-height:36px;
    padding:6px;
  }
}

@media (max-height: 600px) and (orientation: landscape) {
  .app{
    height:100vh;
  }
  
  .header{
    padding:6px 12px;
    min-height:50px;
  }
  
  .video-controls{
    bottom:6px;
    padding:4px 8px;
  }
  
  .ctrl-btn{
    padding:6px;
    min-width:36px;
    min-height:36px;
  }
  
  .chat-messages{
    padding:10px;
  }
  
  .msg{
    padding:8px 12px;
    font-size:0.85rem;
  }
}

/* Dynamic grid layout */
.video-grid.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
.video-grid.grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
.video-grid.grid-3 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
.video-grid.grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
.video-grid.grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
.video-grid.grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

/* Notification */
.copy-notification{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  color:white;
  padding:12px 20px;
  border-radius:10px;
  border:1px solid var(--accent);
  z-index:1000;
  animation:slideDown 0.3s ease;
  backdrop-filter:blur(10px);
  font-size:0.9rem;
  text-align:center;
  max-width:90%;
}

@keyframes slideDown{
  from{
    opacity:0;
    transform:translateX(-50%) translateY(-20px);
  }
  to{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
}

/* Loading spinner */
.loading-spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: var(--accent);
  animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Error message */
.error-message {
  background: rgba(255, 118, 117, 0.2);
  border: 1px solid var(--danger);
  color: #ff7675;
  padding: 10px 15px;
  border-radius: 10px;
  margin: 10px 0;
  text-align: center;
  font-size: 0.9rem;
}

/* Interests Tags */
.interest-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  /* ===== GLOBAL STATE ===== */
  let socket = null;
  let roomId = null;
  let nickname = "Guest" + Math.floor(Math.random() * 1000);
  let localStream = null;
  let screenStream = null;
  let mediaRecorder = null;
  const peers = {};
  let speakerInterval = null;
  let isTextMode = false;
  let isVideoMode = false;
  let inviteMode = 'group_video';
  let userInterests = [];
  let isVIP = false;
  let threeScene = null;
  let typingTimeout = null;
  let fileInput = null;
  let participantCount = 0;
  let iceServers = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun3.l.google.com:19302' },
    { urls: 'stun:stun4.l.google.com:19302' }
  ];

  /* ===== INITIALIZATION ===== */
  document.addEventListener('DOMContentLoaded', function () {
    console.log('ManaMingle Group Chat - Initializing...');
    
    // Initialize 3D Background
    init3DBackground();
    
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);
    const inviteRoom = params.get('room');
    const tagsParam = params.get('tags');
    
    if (tagsParam) {
      try {
        userInterests = JSON.parse(decodeURIComponent(tagsParam));
        console.log('User interests:', userInterests);
        displayInterests(userInterests, 'interestTags');
      } catch (e) {
        console.warn('Invalid interests data');
      }
    }
    
    // Check for VIP in localStorage
    checkVIPStatus();
    
    if (inviteRoom) {
      roomId = inviteRoom;
      inviteMode = params.get('mode') || 'group_video';
      
      if (inviteMode === 'group_text') {
        startTextMode();
      } else {
        startVideoMode();
      }
    }
    
    // Create hidden file input
    createFileInput();
    
    // Setup event listeners
    setupEventListeners();
    
    // Add mobile-specific handlers
    setupMobileHandlers();
  });

  function init3DBackground() {
    try {
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x04060a, 0);
      document.getElementById('threeContainer').appendChild(renderer.domElement);
      
      camera.position.z = 5;
      
      // Create particles
      const particlesGeometry = new THREE.BufferGeometry();
      const particlesCount = 300; // Reduced for mobile performance
      const posArray = new Float32Array(particlesCount * 3);
      
      for(let i = 0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 10;
      }
      
      particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      
      const particlesMaterial = new THREE.PointsMaterial({
        size: 0.02,
        color: 0x00c6ff,
        transparent: true,
        opacity: 0.3
      });
      
      const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
      scene.add(particlesMesh);
      
      // Animation
      function animate() {
        requestAnimationFrame(animate);
        particlesMesh.rotation.x += 0.0005;
        particlesMesh.rotation.y += 0.0005;
        renderer.render(scene, camera);
      }
      
      animate();
      
      // Handle resize
      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }, 250);
      });
      
      threeScene = { scene, camera, renderer, particlesMesh };
      
    } catch (error) {
      console.log('3D background not supported, using CSS fallback');
      createCSSParticles();
    }
  }

  function createCSSParticles() {
    const container = document.getElementById('threeContainer');
    for (let i = 0; i < 30; i++) { // Reduced for mobile
      const particle = document.createElement('div');
      particle.className = 'animation-particle';
      particle.style.width = Math.random() * 15 + 5 + 'px';
      particle.style.height = particle.style.width;
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.top = Math.random() * 100 + 'vh';
      particle.style.animationDuration = Math.random() * 20 + 10 + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      container.appendChild(particle);
    }
  }

  function setupMobileHandlers() {
    // Prevent double-tap zoom
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
    
    // Prevent context menu on buttons
    document.addEventListener('contextmenu', function(e) {
      if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
        e.preventDefault();
      }
    });
    
    // Handle iOS viewport height issues
    function setVH() {
      let vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    
    setVH();
    window.addEventListener('resize', setVH);
    window.addEventListener('orientationchange', setVH);
  }

  function displayInterests(interests, containerId) {
    const container = document.getElementById(containerId);
    if (!container || !interests.length) return;
    
    container.innerHTML = '';
    interests.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'interest-tag';
      span.textContent = tag;
      container.appendChild(span);
    });
  }

  function checkVIPStatus() {
    const vipData = localStorage.getItem('manamingle_vip');
    if (vipData) {
      try {
        const { expiry, active } = JSON.parse(vipData);
        if (active && new Date(expiry) > new Date()) {
          isVIP = true;
          console.log('✅ VIP user detected');
          // Show recording button for VIP users
          const recordBtn = document.querySelector('[data-action="recordScreen"]');
          if (recordBtn) recordBtn.style.display = 'flex';
        }
      } catch (e) {
        console.log('Invalid VIP data');
      }
    }
  }

  /* ===== SOCKET.IO INITIALIZATION ===== */
  function initSocket() {
    if (socket && socket.connected) return;
    
    updateConnectionStatus('connecting');
    
    try {
      socket = io(window.location.origin, {
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: 5,
        reconnectionDelay: 1000,
        reconnectionDelayMax: 5000,
        timeout: 15000,
        query: {
          isVIP: isVIP,
          interests: JSON.stringify(userInterests),
          nickname: nickname,
          platform: /Mobile|Android|iPhone|iPad|iPod/.test(navigator.userAgent) ? 'mobile' : 'desktop'
        }
      });
      
      // Core Socket Event Handlers
      socket.on('connect', handleConnect);
      socket.on('disconnect', handleDisconnect);
      socket.on('connect_error', handleConnectError);
      socket.on('error', handleSocketError);
      socket.on('server-full', handleServerFull);
      socket.on('queue-accepted', handleQueueAccepted);
      socket.on('queue-position', handleQueuePosition);
      
      // Group Chat Events
      socket.on('group-joined', handleGroupJoined);
      socket.on('user-joined', handleUserJoined);
      socket.on('user-left', handleUserLeft);
      socket.on('vip-joined', handleVIPJoined);
      socket.on('room-full', handleRoomFull);
      socket.on('group-emptying', handleGroupEmptying);
      
      // Messaging Events
      socket.on('receive_message', handleReceiveMessage);
      socket.on('user-typing', handleUserTyping);
      
      // File Events
      socket.on('file_received', handleFileReceived);
      
      // WebRTC Events
      socket.on('signal', handleWebRTCSignal);
      socket.on('existing-streams', handleExistingStreams);
      
      // VIP Events
      socket.on('vip-activated', handleVIPActivated);
      socket.on('vip-removed', handleVIPRemoved);
      socket.on('vip-expired', handleVIPExpired);
      socket.on('feature-restricted', handleFeatureRestricted);
      
      // System Events
      socket.on('room-ended', handleRoomEnded);
      socket.on('partner_disconnected', handlePartnerDisconnected);
      socket.on('kicked-for-vip', handleKickedForVIP);
      socket.on('waiting-timeout', handleWaitingTimeout);
      socket.on('server-shutdown', handleServerShutdown);
      
    } catch (error) {
      console.error('❌ Failed to initialize socket:', error);
      showNotification('Failed to connect to server', 'error');
      updateConnectionStatus('disconnected');
    }
  }

  /* ===== SOCKET EVENT HANDLERS ===== */
  function handleConnect() {
    console.log('✅ Connected to server with ID:', socket.id);
    updateConnectionStatus('connected');
    showNotification('Connected to server', 'success');
  }

  function handleDisconnect() {
    console.log('🔌 Disconnected from server');
    updateConnectionStatus('disconnected');
    showNotification('Disconnected from server', 'warning');
  }

  function handleConnectError(error) {
    console.error('❌ Connection error:', error);
    updateConnectionStatus('disconnected');
    showNotification('Connection error. Please check your internet.', 'error');
  }

  function handleSocketError(error) {
    console.error('❌ Socket error:', error);
    showNotification('Connection error: ' + (error.message || 'Unknown error'), 'error');
  }

  function handleServerFull(data) {
    console.log('🚫 Server full:', data);
    document.getElementById('serverFullMessage').textContent = 
      data.message || `Server is currently at full capacity.`;
    document.getElementById('serverFullModal').style.display = 'flex';
  }

  function handleQueueAccepted(data) {
    console.log('✅ Queue accepted:', data);
    showNotification('You are now connected!', 'success');
  }

  function handleQueuePosition(data) {
    console.log('Queue position:', data.position);
    showNotification(`Position in queue: ${data.position}`, 'info');
  }

  function handleGroupJoined(data) {
    console.log('✅ Joined group:', data);
    roomId = data.roomId;
    nickname = data.nickname || nickname;
    participantCount = data.participantCount || 1;
    updateParticipantCount();
    
    // Show common interests if any
    if (data.commonInterests && data.commonInterests.length > 0) {
      showNotification(`Common interests: ${data.commonInterests.join(', ')}`, 'info');
    }
    
    showNotification(`Joined ${data.mode} group with ${participantCount} participants`, 'success');
    
    // For video chat, set up peer connections for existing users
    if (isVideoMode && data.participants) {
      setTimeout(() => {
        data.participants.forEach(participant => {
          if (participant.id !== socket.id) {
            createPeerConnection(participant.id);
          }
        });
      }, 1000);
    }
  }

  function handleUserJoined(data) {
    console.log('👤 User joined:', data);
    participantCount = data.participantCount || participantCount + 1;
    updateParticipantCount();
    showNotification(`${data.nickname || 'Someone'} joined the group`, 'info');
    
    // Create peer connection for new user in video chat
    if (isVideoMode && data.userId !== socket.id && localStream) {
      setTimeout(() => {
        createPeerConnection(data.userId);
      }, 500);
    }
  }

  function handleUserLeft(data) {
    console.log('👋 User left:', data);
    participantCount = data.participantCount || Math.max(1, participantCount - 1);
    updateParticipantCount();
    
    if (isVideoMode) {
      // Remove their video
      if (peers[data.userId]) {
        try {
          peers[data.userId].close();
        } catch (e) {
          console.error('Error closing peer connection:', e);
        }
        delete peers[data.userId];
      }
      const videoCard = document.getElementById('video-' + data.userId);
      if (videoCard) {
        videoCard.remove();
        updateGridLayout();
      }
    }
    
    showNotification(`${data.nickname || 'Someone'} left`, 'info');
  }

  function handleVIPJoined(data) {
    console.log('⭐ VIP joined:', data);
    showNotification(`⭐ ${data.nickname} (VIP) joined the group`, 'info');
  }

  function handleRoomFull(data) {
    console.log('🚫 Room full:', data);
    showVIPModal(data.message || 'This group is full. Upgrade to VIP for instant access.');
  }

  function handleGroupEmptying(data) {
    console.log('⚠️ Group emptying:', data);
    showNotification('Group is emptying. You might want to leave and find another group.', 'warning');
  }

  function handleReceiveMessage(data) {
    console.log('💬 Message received:', data);
    addMessage(data.message, data.senderId === socket.id ? 'me' : 'other', 
               data.senderNickname || data.nickname || data.sender, data.isVIP);
  }

  function handleUserTyping(data) {
    if (isTextMode && data.userId !== socket.id) {
      showTypingIndicator(data.userName || data.userId, data.isTyping);
    }
  }

  function handleFileReceived(data) {
    console.log('📁 File received:', data);
    displayFile(data);
  }

  async function handleWebRTCSignal(data) {
    console.log('📡 Signal received from:', data.from, 'type:', data.type);
    
    let pc = peers[data.from];
    if (!pc) {
      pc = createPeerConnection(data.from);
      peers[data.from] = pc;
    }
    
    try {
      if (data.sdp) {
        console.log('Setting remote SDP:', data.sdp.type);
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        if (data.sdp.type === 'offer') {
          console.log('Creating answer for offer from', data.from);
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit('signal', {
            to: data.from,
            roomId: roomId,
            sdp: pc.localDescription,
            type: 'video'
          });
        }
      }
      
      if (data.candidate) {
        console.log('Adding ICE candidate from', data.from);
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    } catch (error) {
      console.error('Error handling WebRTC signal:', error);
    }

  function goBack() {
    console.log('Going back...');
    
    // Leave room
    if (socket && roomId) {
      socket.emit('leave-group', { roomId });
    }
    
    // Close all peer connections
    Object.values(peers).forEach(pc => {
      if (pc && typeof pc.close === 'function') {
        try {
          pc.close();
        } catch (e) {
          console.error('Error closing peer connection:', e);
        }
      }
    });
    for (const id in peers) delete peers[id];
    
    // Stop media streams
    if (localStream) {
      localStream.getTracks().forEach(track => {
        track.stop();
      });
      localStream = null;
    }
    
    if (screenStream) {
      screenStream.getTracks().forEach(track => track.stop());
      screenStream = null;
    }
    
    // Stop recording
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    
    // Stop active speaker detection
    if (speakerInterval) {
      clearInterval(speakerInterval);
      speakerInterval = null;
    }
    
    // Clear UI
    const videoGrid = document.getElementById('videoGrid');
    if (videoGrid) videoGrid.innerHTML = '';
    
    const messages = document.getElementById('messages');
    if (messages) messages.innerHTML = '';
    
    // Reset UI

    isVideoMode = false;

  }

  /* ===== VIDEO FUNCTIONS ===== */
  async function startCamera() {
    try {
      const constraints = {
        video: {
          width: { ideal: 640, min: 320, max: 1280 },
          height: { ideal: 480, min: 240, max: 720 },
          frameRate: { ideal: 24, min: 15 },
          facingMode: 'user'
        },
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      };
      
      // Try for optimal quality first
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
      
      console.log('Camera started successfully');
      addVideo('me', localStream, true);
      initActiveSpeaker();
      return localStream;
      
    } catch (error) {
      console.error('Error accessing camera:', error);
      
      let errorMessage = 'Failed to access camera';
      if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
        errorMessage = 'Camera permission denied. Please allow camera access in your browser settings.';
      } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
        errorMessage = 'No camera found on your device';
      } else if (error.name === 'NotReadableError' || error.name === 'TrackStartError') {
        errorMessage = 'Camera is already in use by another application';
      }
      
      showNotification(errorMessage, 'error');
      throw error;
    }
  }

  function createPeerConnection(peerId) {
    console.log('Creating peer connection for:', peerId);
    
    try {
      const pc = new RTCPeerConnection({
        iceServers: iceServers,
        iceCandidatePoolSize: 10,
        bundlePolicy: 'max-bundle',
        rtcpMuxPolicy: 'require'
      });
      
      if (localStream) {
        localStream.getTracks().forEach(track => {
          try {
            pc.addTrack(track, localStream);
          } catch (e) {
            console.error('Error adding track:', e);
          }
        });
      }
      
      pc.ontrack = (event) => {
        console.log('Received remote stream from:', peerId);
        if (event.streams && event.streams[0]) {
          setTimeout(() => {
            addVideo(peerId, event.streams[0]);
          }, 100);
        }
      };
      
      pc.onicecandidate = (event) => {
        if (event.candidate && socket) {
          socket.emit('signal', {
            to: peerId,
            roomId: roomId,
            candidate: event.candidate,
            type: 'video'
          });
        }
      };
      
      pc.oniceconnectionstatechange = () => {
        console.log(`ICE connection state for ${peerId}: ${pc.iceConnectionState}`);
        if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') {
          console.log(`ICE connection failed for ${peerId}`);
          // Try to restart ICE
          setTimeout(() => {
            if (pc.iceConnectionState !== 'connected' && pc.iceConnectionState !== 'checking') {
              console.log(`Restarting ICE for ${peerId}`);
              pc.restartIce();
            }
          }, 1000);
        }
      };
      
      pc.onconnectionstatechange = () => {
        console.log(`Connection state with ${peerId}: ${pc.connectionState}`);
        if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
          const videoCard = document.getElementById('video-' + peerId);
          if (videoCard) videoCard.remove();
          delete peers[peerId];
          updateGridLayout();
        }
      };
      
      // Only create offer if we're the "lower" ID
      if (socket.id < peerId) {
        setTimeout(async () => {
          try {
            const offer = await pc.createOffer({
              offerToReceiveAudio: true,
              offerToReceiveVideo: true
            });
            await pc.setLocalDescription(offer);
            socket.emit('signal', {
              to: peerId,
              roomId: roomId,
              sdp: pc.localDescription,
              type: 'video'
            });
          } catch (error) {
            console.error('Error creating offer:', error);
          }
        }, 500 + Math.random() * 500);
      }
      
      peers[peerId] = pc;
      return pc;
      
    } catch (error) {
      console.error('Error creating peer connection:', error);
      return null;
    }
  }

  async function toggleScreenShare(button) {
    if (!isVIP) {
      showVIPModal('Screen sharing is a VIP-only feature. Upgrade to VIP to share your screen.');
      return;
    }
    
    try {
      if (!screenStream) {
        // Start screen sharing
        screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: {
            cursor: "always",
            frameRate: { ideal: 15 },
            width: { max: 1280 },
            height: { max: 720 }
          },
          audio: false
        });
        
        const videoTrack = screenStream.getVideoTracks()[0];
        if (videoTrack) {
          // Replace video track in all peer connections
          Object.values(peers).forEach(pc => {
            const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
            if (sender) {
              sender.replaceTrack(videoTrack);
            }
          });
          
          // Update local video display
          const meVideo = document.querySelector('#video-me video');
          if (meVideo && localStream) {
            const newStream = new MediaStream([videoTrack, ...localStream.getAudioTracks()]);
            meVideo.srcObject = newStream;
          }
          
          button.classList.add('off');
          button.innerHTML = '🛑';
          showNotification('Screen sharing started (VIP)', 'success');
          
          // Handle when user stops sharing via browser UI
          videoTrack.onended = () => {
            toggleScreenShare(button);
          };
        }
      } else {
        // Stop screen sharing
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;
        
        // Switch back to camera
        try {
          const cameraStream = await navigator.mediaDevices.getUserMedia({ 
            video: true,
            audio: false 
          });
          const cameraTrack = cameraStream.getVideoTracks()[0];
          
          if (cameraTrack && localStream) {
            // Replace video track in all peer connections
            Object.values(peers).forEach(pc => {
              const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
              if (sender) {
                sender.replaceTrack(cameraTrack);
              }
            });
            
            // Update local stream
            const oldVideoTrack = localStream.getVideoTracks()[0];
            if (oldVideoTrack) {
              localStream.removeTrack(oldVideoTrack);
              oldVideoTrack.stop();
            }
            localStream.addTrack(cameraTrack);
            
            // Update local video display
            const meVideo = document.querySelector('#video-me video');
            if (meVideo) {
              meVideo.srcObject = localStream;
            }
          }
          
          cameraStream.getTracks().forEach(track => {
            if (track.kind === 'audio') track.stop();
          });
        } catch (error) {
          console.error('Error switching back to camera:', error);
        }
        
        button.classList.remove('off');
        button.innerHTML = '🖥️';
        showNotification('Screen sharing stopped', 'info');
      }
    } catch (error) {
      console.error('Screen share error:', error);
      if (error.name !== 'NotAllowedError') {
        showNotification('Screen share cancelled', 'info');
      }
    }
  }

  async function recordScreen(button) {
    if (!isVIP) {
      showVIPModal('Screen recording is a VIP-only feature. Upgrade to VIP to record your screen.');
      return;
    }
    
    try {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        button.innerHTML = '🎬';
        showNotification('Recording stopped', 'info');
      } else {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { 
            frameRate: { ideal: 15 }
          },
          audio: false
        });
        
        mediaRecorder = new MediaRecorder(stream, {
          mimeType: 'video/webm;codecs=vp9',
          videoBitsPerSecond: 1000000
        });
        
        const recordedChunks = [];
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            recordedChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `manamingle-recording-${Date.now()}.webm`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showNotification('Recording saved (VIP)', 'success');
          
          stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        button.innerHTML = '⏹️';
        showNotification('Recording started (VIP)', 'success');
        
        // Auto-stop after 10 minutes
        setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            button.innerHTML = '🎬';
          }
        }, 10 * 60 * 1000);
      }
    } catch (error) {
      console.error('Recording error:', error);
      if (error.name !== 'NotAllowedError') {
        showNotification('Recording cancelled', 'info');
      }
    }
  }

  /* ===== UI UPDATE FUNCTIONS ===== */
  function updateParticipantCount() {
    const countEl = document.getElementById('participantCount');
    if (countEl) {
      countEl.textContent = `${participantCount} online`;
    }
    
    const title = document.getElementById('roomTitle');
    if (title && isVideoMode) {
      const videoGrid = document.getElementById('videoGrid');
      const videoCount = videoGrid ? videoGrid.querySelectorAll('.video-card').length : 0;
      title.textContent = `Video Chat (${videoCount})`;
    }
  }

  function updateGridLayout() {
    const videoGrid = document.getElementById('videoGrid');
    if (!videoGrid) return;
    
    const cards = videoGrid.querySelectorAll('.video-card');
    const count = cards.length;
    
    // Reset grid classes
    videoGrid.className = 'video-grid';
    
    // Set grid layout based on number of participants
    if (count <= 1) {
      videoGrid.classList.add('grid-1');
    } else if (count === 2) {
      videoGrid.classList.add('grid-2');
    } else if (count === 3) {
      videoGrid.classList.add('grid-3');
    } else if (count === 4) {
      videoGrid.classList.add('grid-4');
    } else if (count <= 6) {
      videoGrid.classList.add('grid-6');
    } else {
      // For more than 6, use 3xN grid
      const rows = Math.ceil(count / 3);
      videoGrid.style.gridTemplateColumns = 'repeat(3, 1fr)';
      videoGrid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }
  }

  function initActiveSpeaker() {
    if (!localStream || speakerInterval) return;
    
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const analyser = audioContext.createAnalyser();
      const source = audioContext.createMediaStreamSource(localStream);
      source.connect(analyser);
      analyser.fftSize = 128;
      analyser.smoothingTimeConstant = 0.8;
      
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      speakerInterval = setInterval(() => {
        analyser.getByteFrequencyData(dataArray);
        const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
        const meCard = document.getElementById('video-me');
        if (meCard) {
          meCard.classList.toggle('speaking', average > 10);
        }
      }, 300);
    } catch (error) {
      console.error('Error initializing audio analysis:', error);
    }
  }

  /* ===== VIP FUNCTIONS ===== */
  function showVIPModal(message) {
    const vipModal = document.getElementById('vipModal');
    const vipMessage = document.getElementById('vipMessage');
    if (vipModal && vipMessage) {
      if (message) vipMessage.textContent = message;
      vipModal.style.display = 'flex';
    }
  }

  function closeVIPModal() {
    const vipModal = document.getElementById('vipModal');
    if (vipModal) vipModal.style.display = 'none';
  }

  function buyVIP() {
    showNotification('Processing payment...', 'info');
    
    // Simulate payment processing
    setTimeout(() => {
      const expiry = new Date();
      expiry.setDate(expiry.getDate() + 30);
      
      const vipData = {
        active: true,
        expiry: expiry.toISOString(),
        purchased: new Date().toISOString(),
        tier: 'premium'
      };
      
      localStorage.setItem('manamingle_vip', JSON.stringify(vipData));
      
      isVIP = true;
      closeVIPModal();
      showNotification('🎉 VIP Activated! You now have VIP features.', 'success');
      
      const recordBtn = document.querySelector('[data-action="recordScreen"]');
      if (recordBtn) recordBtn.style.display = 'flex';
      
      if (socket) {
        socket.emit('vip-upgraded', vipData);
      }
    }, 1500);
  }

  /* ===== UTILITY FUNCTIONS ===== */
  function copyInvite() {
    const inviteUrl = roomId ? 
      `${window.location.origin}${window.location.pathname}?room=${roomId}&mode=${inviteMode}` :
      `${window.location.origin}${window.location.pathname}`;
    
    navigator.clipboard.writeText(inviteUrl)
      .then(() => showNotification('Invite link copied!', 'success'))
      .catch(() => {
        // Fallback for older browsers
        const textArea = document.createElement('textarea');
        textArea.value = inviteUrl;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          showNotification('Invite link copied!', 'success');
        } catch (err) {
          showNotification('Failed to copy invite link', 'error');
        }
        document.body.removeChild(textArea);
      });
  }

  function showNotification(message, type = 'info') {
    // Remove existing notifications
    document.querySelectorAll('.copy-notification').forEach(el => el.remove());
    
    const notification = document.createElement('div');
    notification.className = 'copy-notification';
    notification.textContent = message;
    
    switch (type) {
      case 'error':
        notification.style.borderColor = 'var(--danger)';
        notification.style.background = 'rgba(255, 118, 117, 0.15)';
        break;
      case 'success':
        notification.style.borderColor = 'var(--green)';
        notification.style.background = 'rgba(0, 209, 154, 0.15)';
        break;
      case 'warning':
        notification.style.borderColor = 'var(--orange)';
        notification.style.background = 'rgba(255, 159, 67, 0.15)';
        break;
      default:
        notification.style.borderColor = 'var(--accent)';
        notification.style.background = 'rgba(0, 198, 255, 0.15)';
    }
    
    document.body.appendChild(notification);
    
    // Auto-remove after 3 seconds
    setTimeout(() => {
      notification.style.opacity = '0';
      notification.style.transform = 'translateX(-50%) translateY(-20px)';
      setTimeout(() => notification.remove(), 300);
    }, 3000);
  }

  function updateConnectionStatus(status) {
    const statusEl = document.getElementById('connectionStatus');
    const dotEl = document.getElementById('statusDot');
    const textEl = document.getElementById('statusText');
    
    if (!statusEl || !dotEl || !textEl) return;
    
    statusEl.style.display = 'flex';
    
    switch(status) {
      case 'connected':
        dotEl.className = 'status-dot status-connected';
        textEl.textContent = 'Connected';
        break;
      case 'connecting':
        dotEl.className = 'status-dot status-connecting';
        textEl.textContent = 'Connecting...';
        break;
      case 'disconnected':
        dotEl.className = 'status-dot status-disconnected';
        textEl.textContent = 'Disconnected';
        break;
    }
  }

  /* ===== EVENT LISTENERS ===== */
  function setupEventListeners() {
    // Button event listeners
    document.getElementById('startTextBtn').addEventListener('click', startTextMode);
    document.getElementById('startVideoBtn').addEventListener('click', startVideoMode);
    document.getElementById('homeBtn').addEventListener('click', goHome);
    document.getElementById('mobileHomeBtn').addEventListener('click', goHome);
    document.getElementById('modeTextBtn').addEventListener('click', startTextMode);
    document.getElementById('modeVideoBtn').addEventListener('click', startVideoMode);
    document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
    document.getElementById('saveNicknameBtn').addEventListener('click', saveNickname);
    document.getElementById('buyVIPBtn').addEventListener('click', buyVIP);
    document.getElementById('cancelVIPBtn').addEventListener('click', closeVIPModal);
    document.getElementById('retryBtn').addEventListener('click', () => location.reload());
    document.getElementById('vipSkipBtn').addEventListener('click', showVIPModal);
    document.getElementById('copyInviteBtn').addEventListener('click', copyInvite);
    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('fileUploadBtn').addEventListener('click', () => fileInput && fileInput.click());
    
    // Message input events
    const msgInput = document.getElementById('msgInput');
    if (msgInput) {
      msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      
      msgInput.addEventListener('input', () => {
        if (msgInput.value.trim()) {
          sendTypingIndicator(true);
        } else {
          sendTypingIndicator(false);
        }
      });
      
      // Prevent iOS zoom on focus
      msgInput.addEventListener('focus', () => {
        setTimeout(() => {
          msgInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
      });
    }
    
    // Nickname input
    const nicknameInput = document.getElementById('nickname');
    if (nicknameInput) {
      nicknameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') saveNickname();
      });
      
      nicknameInput.addEventListener('input', () => {
        const errorEl = document.getElementById('nickError');
        if (errorEl) errorEl.style.display = 'none';
      });
    }
    
    // Video controls delegation
    const globalControls = document.getElementById('globalControls');
    if (globalControls) {
      globalControls.addEventListener('click', (e) => {
        const button = e.target.closest('[data-action]');
        if (button) {
          const action = button.dataset.action;
          switch (action) {
            case 'toggleMic':
              toggleMic(button);
              break;
            case 'toggleCam':
              toggleCam(button);
              break;
            case 'toggleScreenShare':
              toggleScreenShare(button);
              break;
            case 'recordScreen':
              recordScreen(button);
              break;
          }
        }
      });
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && (isTextMode || isVideoMode)) {
        goBack();
      }
      
      if (e.key === 'Enter' && isTextMode && !e.shiftKey && document.activeElement.id === 'msgInput') {
        e.preventDefault();
        sendMessage();
      }
      
      // Video shortcuts (only when in video mode and not in input)
      if (isVideoMode && !e.ctrlKey && !e.metaKey && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
        switch(e.key.toLowerCase()) {
          case 'm':
            const micBtn = document.querySelector('[data-action="toggleMic"]');
            if (micBtn) toggleMic(micBtn);
            break;
          case 'c':
            const camBtn = document.querySelector('[data-action="toggleCam"]');
            if (camBtn) toggleCam(camBtn);
            break;
          case 's':
            if (isVIP) {
              const screenBtn = document.querySelector('[data-action="toggleScreenShare"]');
              if (screenBtn) toggleScreenShare(screenBtn);
            }
            break;
          case 'r':
            if (isVIP) {
              const recordBtn = document.querySelector('[data-action="recordScreen"]');
              if (recordBtn) recordScreen(recordBtn);
            }
            break;
        }
      }
    });
    
    // Window resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        updateGridLayout();
      }, 250);
    });
    
    // Modal clicks
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) {
        e.target.style.display = 'none';
      }
    });
    
    // Before unload
    window.addEventListener('beforeunload', (e) => {
      if (socket && roomId) {
        socket.emit('leave-group', { roomId });
      }
      return null;
    });
    
    // Handle page visibility changes
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Page is hidden - pause videos to save resources
        document.querySelectorAll('video').forEach(video => {
          if (!video.paused) video.pause();
        });
      } else {
        // Page is visible - resume videos
        document.querySelectorAll('video').forEach(video => {
          if (video.paused && video.srcObject) {
            video.play().catch(e => console.log('Video play error:', e));
          }
        });
      }
    });
    
    // Handle touch events for mobile
    document.addEventListener('touchstart', (e) => {
      // Add visual feedback for buttons
      if (e.target.closest('button')) {
        e.target.closest('button').style.opacity = '0.8';
      }
    }, { passive: true });
    
    document.addEventListener('touchend', (e) => {
      if (e.target.closest('button')) {
        e.target.closest('button').style.opacity = '1';
      }
    }, { passive: true });
  }

  // Global error handling
  window.addEventListener('error', (e) => {
    console.error('Global error:', e.error);
    showNotification('An error occurred. Please refresh the page.', 'error');
  });

  window.addEventListener('unhandledrejection', (e) => {
    console.error('Unhandled promise rejection:', e.reason);
    showNotification('An error occurred. Please try again.', 'error');
  });
</script>
