  // =========== PREVENT ZOOM ===========
  function preventZoom() {
    document.addEventListener('touchstart', function(e) {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
    
    // Prevent iOS double tap zoom
    document.addEventListener('dblclick', function(e) {
      e.preventDefault();
    }, { passive: false });
  }

  // =========== COUNTRY DETECTION ===========
  async function detectUserCountry() {
    try {
      // Try browser language first
      const lang = navigator.language || navigator.userLanguage;
      if (lang && lang.includes("-")) {
        state.userCountry = lang.split("-")[1].toLowerCase();
      } else {
        // Fallback to IP detection
        try {
          const response = await fetch('https://ipapi.co/json/', { 
            signal: AbortSignal.timeout(3000)
          });
          if (response.ok) {
            const data = await response.json();
            state.userCountry = data.country_code ? data.country_code.toLowerCase() : null;
          }
        } catch (ipError) {
          console.warn("IP detection failed:", ipError);
        }
      }
    } catch (error) {
      console.warn("Country detection error:", error);
      state.userCountry = null;
    }
  }

  // =========== STATUS MANAGEMENT ===========
  function updateStatus(text, type = "waiting") {
    if (elements.statusText) {
      elements.statusText.textContent = text;
    }
    
    if (elements.statusDot) {
      elements.statusDot.className = "status-dot " + type;
    }
    
    // Update match banner visibility
    if (type === "waiting" && elements.findingMatchBanner) {
      elements.findingMatchBanner.classList.add('show');
    } else {
      elements.findingMatchBanner.classList.remove('show');
    }
  }

  // =========== MATCHING LOGIC ===========
  function startMatching() {
    console.log("Starting matching process...");
    
    state.isMatching = true;
    state.matchStartTime = Date.now();
    state.sessionStartTime = Date.now();
    
    // Update status
    updateStatus("Finding match...", "waiting");
    
    // Start match time update
    state.matchUpdateInterval = setInterval(updateMatchTime, 1000);
    
    // Enable chat input for testing
    elements.chatInput.disabled = false;
    elements.sendBtn.disabled = false;
    
    // Clear messages
    elements.messages.innerHTML = '';
    
    // Send join request to server
    socket.emit("join_chat", {
      mode: state.mode,
      nickname: state.userName,
      tags: state.tags,
      token: localStorage.getItem('userToken') || null,
      userAgent: navigator.userAgent,
      country: state.userCountry,
      socketId: socket.id
    });
  }

  function stopMatching() {
    state.isMatching = false;
    
    // Clear match update interval
    if (state.matchUpdateInterval) {
      clearInterval(state.matchUpdateInterval);
      state.matchUpdateInterval = null;
    }
    
    console.log("Matching stopped");
  }

  function updateMatchTime() {
    if (!state.isMatching || !state.matchStartTime) return;
    
    const elapsed = Math.floor((Date.now() - state.matchStartTime) / 1000);
    if (elements.matchTime) {
      elements.matchTime.textContent = `${elapsed}s`;
    }
  }

  // =========== EVENT LISTENERS ===========
  function setupEventListeners() {
    console.log("Setting up event listeners...");
    
    // Navigation
    elements.backBtn.addEventListener("click", goBackToHome);
    elements.closeStatsBtn.addEventListener("click", () => {
      elements.chatStats.classList.remove("show");
    });
    
    // History
    elements.historyBtn.addEventListener('click', showMessageHistory);
    elements.closeHistoryBtn.addEventListener('click', hideMessageHistory);
    
    // Stats
    elements.statsBtn.addEventListener('click', toggleStats);
    
    // Sound toggle
    elements.soundToggle.addEventListener('click', toggleSound);
    
    // Keyboard shortcuts
    document.addEventListener("keydown", handleKeyDown);
    
    // Chat input
    elements.chatInput.addEventListener("input", handleInput);
    elements.chatInput.addEventListener("focus", handleInputFocus);
    elements.chatInput.addEventListener("blur", handleInputBlur);
    
    // Buttons
    elements.sendBtn.addEventListener("click", sendMessage);
    elements.skipBtn.addEventListener("click", skipChat);
    
    if (elements.toggleMic) elements.toggleMic.addEventListener("click", toggleMute);
    if (elements.toggleCam) elements.toggleCam.addEventListener("click", toggleCamera);
    if (elements.toggleVideoChat) elements.toggleVideoChat.addEventListener("click", focusChatInput);
    
    // Report
    elements.reportBtn.addEventListener("click", reportUser);
    
    // Window events
    window.addEventListener('resize', resizeHandler);
    window.addEventListener('orientationchange', handleOrientationChange);
    
    // Connection monitoring
    state.connectionCheckInterval = setInterval(checkConnectionQuality, 5000);
    
    // Start stats update
    state.statsUpdateInterval = setInterval(updateChatStats, 1000);
  }

  function handleKeyDown(e) {
    if (e.key === "Escape") {
      e.preventDefault();
      if (elements.messageHistory.classList.contains('show')) {
        hideMessageHistory();
      } else if (elements.chatStats.classList.contains('show')) {
        elements.chatStats.classList.remove('show');
      } else {
        skipChat();
      }
    }
    if (e.key === "Enter" && !e.shiftKey && document.activeElement === elements.chatInput) {
      e.preventDefault();
      sendMessage();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
      e.preventDefault();
      toggleMute();
    }
  }

  function handleInput() {
    notifyTyping();
    
    // Auto-resize textarea
    const input = elements.chatInput;
    input.style.height = 'auto';
    const newHeight = Math.min(input.scrollHeight, 100);
    input.style.height = newHeight + 'px';
    
    // Update container height if needed
    elements.chatInputArea.style.minHeight = Math.max(80, newHeight + 32) + 'px';
  }

  function handleInputFocus() {
    // Add focus style
    elements.chatInput.parentElement.classList.add('focused');
    
    // On mobile, ensure input is visible
    if ('ontouchstart' in window) {
      setTimeout(() => {
        elements.messages.scrollTop = elements.messages.scrollHeight;
      }, 100);
    }
  }

  function handleInputBlur() {
    // Remove focus style
    elements.chatInput.parentElement.classList.remove('focused');
    
    // Reset textarea height when empty
    if (!elements.chatInput.value.trim()) {
      elements.chatInput.style.height = 'auto';
      elements.chatInputArea.style.minHeight = '80px';
    }
  }

  function resizeHandler() {
    // Recreate background effects on resize
    createBackgroundEffects();
    
    // Ensure messages are scrolled to bottom
    setTimeout(() => {
      if (elements.messages) {
        elements.messages.scrollTop = elements.messages.scrollHeight;
      }
    }, 100);
    
    // Re-layout video if needed
    if (state.isVideoMode) {
      requestAnimationFrame(() => {
        if (elements.localVideo) elements.localVideo.style.width = '100%';
        if (elements.remoteVideo) elements.remoteVideo.style.width = '100%';
      });
    }
  }

  function handleOrientationChange() {
    // Handle orientation change with debounce
    clearTimeout(state.orientationTimeout);
    state.orientationTimeout = setTimeout(() => {
      resizeHandler();
      
      // Restart ICE on video mode
      if (state.isVideoMode && state.peerConnection) {
        setTimeout(() => restartIce(), 1000);
      }
    }, 500);
  }

  function goBackToHome() {
    console.log("Going back to home...");
    
    // Add exit animation
    document.body.style.opacity = '0.8';
    document.body.style.transform = 'scale(0.98)';
    
    // Clean up
    cleanupVideo();
    stopMatching();
    
    if (state.roomId) {
      socket.emit("skip", { room: state.roomId });
    }
    
    // Clear intervals
    clearAllIntervals();
    
    // Navigate with delay for animation
    setTimeout(() => {
      window.location.href = "index.html";
    }, 300);
  }

  // =========== VIDEO FUNCTIONS ===========
  async function initializeVideo() {
    console.log("Initializing video...");
    
    try {
      elements.localStatus.style.display = "flex";
      
      // Get user media with appropriate constraints
      const constraints = {
        video: {
          width: { ideal: 640, max: 1280 },
          height: { ideal: 480, max: 720 },
          frameRate: { ideal: 24, max: 30 },
          facingMode: "user",
          aspectRatio: 1.777
        },
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          channelCount: 2,
          sampleRate: 48000
        }
      };
      
      // For mobile devices, adjust constraints
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        constraints.video = {
          width: { ideal: 640, max: 1280 },
          height: { ideal: 480, max: 720 },
          frameRate: { ideal: 24, max: 30 },
          facingMode: { exact: "user" }
        };
      }
      
      state.localStream = await navigator.mediaDevices.getUserMedia(constraints);
      
      // Apply to local video
      elements.localVideo.srcObject = state.localStream;
      
      // Force play with error handling
      const playPromise = elements.localVideo.play();
      if (playPromise !== undefined) {
        playPromise.catch(e => {
          console.log("Local video play warning:", e);
          // Try muted play
          elements.localVideo.muted = true;
          elements.localVideo.play();
        });
      }
      
      elements.localStatus.style.display = "none";
      
      console.log("Video initialized successfully");
      return true;
      
    } catch (error) {
      console.error("Error initializing video:", error);
      showNotification("Failed to access camera/microphone. Switching to text mode.", "error");
      
      // Try fallback without video
      try {
        const audioOnly = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.localStream = audioOnly;
        showNotification("Audio only mode enabled", "warning");
      } catch (audioError) {
        fallbackToTextMode();
      }
      return false;
    }
  }

  function fallbackToTextMode() {
    state.mode = "text";
    state.isVideoMode = false;
    elements.videoArea.style.display = "none";
    
    // Update URL
    const url = new URL(window.location);
    url.searchParams.set('mode', 'text');
    window.history.replaceState({}, '', url);
    
    // Notify server
    if (state.roomId) {
      socket.emit("mode_change", { mode: 'text', room: state.roomId });
    }
    
    showNotification("Switched to text chat mode", "info");
  }

  async function createPeerConnection() {
    console.log("Creating peer connection...");
    
    // Close old connection if exists
    if (state.peerConnection) {
      try {
        state.peerConnection.close();
      } catch (e) {
        console.warn("Error closing old peer connection:", e);
      }
    }
    
    // Create new peer connection
    state.peerConnection = new RTCPeerConnection({
      iceServers: state.iceServers,
      iceCandidatePoolSize: 10,
      iceTransportPolicy: "all",
      bundlePolicy: "max-bundle",
      rtcpMuxPolicy: "require"
    });
    
    state.pendingIceCandidates = [];
    
    // Add local stream tracks
    if (state.localStream) {
      state.localStream.getTracks().forEach(track => {
        state.peerConnection.addTrack(track, state.localStream);
      });
    }
    
    // Handle remote track
    state.peerConnection.ontrack = (event) => {
      const stream = event.streams[0];
      if (!stream) return;
      
      console.log("Remote track received:", event.track.kind);
      
      elements.remoteVideo.srcObject = stream;
      elements.remoteVideo.playsInline = true;
      elements.remoteVideo.setAttribute("playsinline", "");
      
      // Play video
      const playVideo = () => {
        elements.remoteVideo.play()
          .then(() => {
            elements.remoteStatus.style.display = "none";
          })
          .catch(err => {
            console.log("Remote video play error:", err);
            setTimeout(playVideo, 100);
          });
      };
      
      if (elements.remoteVideo.readyState >= 2) {
        playVideo();
      } else {
        elements.remoteVideo.onloadedmetadata = playVideo;
      }
    };
    
    // ICE candidate handling
    state.peerConnection.onicecandidate = (event) => {
      if (event.candidate && state.roomId) {
        socket.emit("signal", {
          room: state.roomId,
          candidate: event.candidate,
          sender: socket.id
        });
      }
    };
    
    // Connection state changes
    state.peerConnection.onconnectionstatechange = () => {
      const connectionState = state.peerConnection.connectionState;
      console.log("Connection state:", connectionState);
      
      switch(connectionState) {
        case "connected":
          updateStatus("Connected", "connected");
          showNotification("Video connected!", "success");
          break;
        case "disconnected":
          updateStatus("Disconnected", "waiting");
          showNotification("Connection unstable", "warning");
          break;
        case "failed":
          updateStatus("Connection failed", "error");
          showNotification("Connection failed", "error");
          attemptReconnect();
          break;
        case "closed":
          console.log("Peer connection closed");
          break;
      }
    };
    
    // ICE connection state
    state.peerConnection.oniceconnectionstatechange = () => {
      console.log("ICE connection state:", state.peerConnection.iceConnectionState);
    };
    
    return true;
  }

  async function handleRemoteSDP(sdp) {
    if (!state.peerConnection) {
      await createPeerConnection();
    }
    
    await state.peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
    
    // Add pending ICE candidates
    for (const candidate of state.pendingIceCandidates) {
      try {
        await state.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (e) {
        console.warn("Failed to add pending ICE candidate:", e);
      }
    }
    state.pendingIceCandidates = [];
    
    // Create answer if we received an offer
    if (sdp.type === "offer") {
      const answer = await state.peerConnection.createAnswer();
      await state.peerConnection.setLocalDescription(answer);
      
      socket.emit("signal", {
        room: state.roomId,
        sdp: answer,
        sender: socket.id
      });
    }
  }

  async function handleRemoteCandidate(candidate) {
    if (!state.peerConnection || !state.peerConnection.remoteDescription) {
      state.pendingIceCandidates.push(candidate);
      return;
    }
    
    try {
      await state.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    } catch (e) {
      console.warn("Failed to add ICE candidate:", e);
    }
  }

  function attemptReconnect() {
    if (!state.roomId || !state.isVideoMode || state.reconnectAttempts >= 3) return;
    
    state.reconnectAttempts++;
    showNotification(`Reconnecting... (${state.reconnectAttempts}/3)`, "warning");
    
    setTimeout(() => {
      if (state.peerConnection && state.peerConnection.connectionState === "failed") {
        restartIce();
      }
    }, 2000 * state.reconnectAttempts);
  }

  async function restartIce() {
    if (!state.peerConnection) return;
    
    try {
      console.log("Restarting ICE...");
      const offer = await state.peerConnection.createOffer({ iceRestart: true });
      await state.peerConnection.setLocalDescription(offer);
      
      socket.emit("signal", {
        room: state.roomId,
        sdp: state.peerConnection.localDescription,
        sender: socket.id
      });
    } catch (error) {
      console.error("Error restarting ICE:", error);
    }
  }

  function toggleMute() {
    if (!state.localStream) return;
    
    state.isMuted = !state.isMuted;
    const audioTracks = state.localStream.getAudioTracks();
    
    if (audioTracks.length > 0) {
      audioTracks.forEach(track => {
        track.enabled = !state.isMuted;
      });
    }
    
    const icon = elements.toggleMic.querySelector(".icon");
    const text = elements.toggleMic.querySelector(".text");
    icon.textContent = state.isMuted ? "🔇" : "🎤";
    text.textContent = state.isMuted ? "Unmute" : "Mute";
    elements.toggleMic.classList.toggle("active", state.isMuted);
    
    // Create particle effect
    createParticleEffect(elements.toggleMic);
    
    showNotification(state.isMuted ? "Microphone muted" : "Microphone unmuted");
  }

  function toggleCamera() {
    if (!state.localStream) return;
    
    state.isCameraOff = !state.isCameraOff;
    const videoTracks = state.localStream.getVideoTracks();
    
    if (videoTracks.length > 0) {
      videoTracks.forEach(track => {
        track.enabled = !state.isCameraOff;
      });
    }
    
    const icon = elements.toggleCam.querySelector(".icon");
    const text = elements.toggleCam.querySelector(".text");
    icon.textContent = state.isCameraOff ? "📷" : "🎥";
    text.textContent = state.isCameraOff ? "Show" : "Hide";
    elements.toggleCam.classList.toggle("active", state.isCameraOff);
    
    elements.localVideo.style.opacity = state.isCameraOff ? "0.3" : "1";
    elements.localStatus.style.display = state.isCameraOff ? "flex" : "none";
    
    // Create particle effect
    createParticleEffect(elements.toggleCam);
    
    showNotification(state.isCameraOff ? "Camera hidden" : "Camera shown");
  }

  function focusChatInput() {
    elements.chatInput.focus();
    createParticleEffect(elements.toggleVideoChat);
  }

  function cleanupVideo() {
    console.log("Cleaning up video...");
    
    if (state.peerConnection) {
      try {
        state.peerConnection.close();
      } catch (e) {
        console.log("Error closing peer connection:", e);
      }
      state.peerConnection = null;
    }
    
    if (state.localStream) {
      state.localStream.getTracks().forEach(track => {
        track.stop();
      });
      state.localStream = null;
    }
    
    elements.remoteVideo.srcObject = null;
    elements.localVideo.srcObject = null;
    elements.localStatus.style.display = "flex";
    elements.remoteStatus.style.display = "flex";
    elements.remoteStatus.innerHTML = `
      <div class="spinner"></div>
      <div>Waiting for partner...</div>
    `;
    
    state.pendingIceCandidates = [];
    state.reconnectAttempts = 0;
    state.videoRetryCount = 0;
  }

  // =========== PARTICLE ANIMATIONS ===========
  function createParticleEffect(element) {
    if (!element) return;
    
    const rect = element.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    for (let i = 0; i < 8; i++) {
      const particle = document.createElement('div');
      particle.className = 'message-particle';
      
      const angle = (i / 8) * Math.PI * 2;
      const distance = 30 + Math.random() * 20;
      const tx = Math.cos(angle) * distance;
      const ty = Math.sin(angle) * distance;
      
      particle.style.setProperty('--tx', `${tx}px`);
      particle.style.setProperty('--ty', `${ty}px`);
      particle.style.left = `${centerX}px`;
      particle.style.top = `${centerY}px`;
      
      // Random color
      const colors = ['#00c6ff', '#a855f7', '#00d19a', '#ff9f43'];
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      
      document.body.appendChild(particle);
      
      // Remove particle after animation
      setTimeout(() => {
        if (particle.parentNode) {
          particle.parentNode.removeChild(particle);
        }
      }, 1000);
    }
  }

  // =========== MESSAGE FUNCTIONS ===========
  function sendMessage() {
    const message = elements.chatInput.value.trim();
    if (!message || !state.roomId) return;
    
    // Generate unique message ID
    const messageId = Date.now().toString(36) + Math.random().toString(36).substr(2);
    state.sentMessageIds.add(messageId);
    
    // Create optimistic UI update
    appendMessage(message, "you", messageId);
    
    // Add to history
    const timestamp = new Date();
    state.messageHistory.push({
      id: messageId,
      content: message,
      sender: "you",
      timestamp: timestamp.toISOString(),
      time: timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    });
    
    state.messagesSent++;
    
    // Send to server
    socket.emit("send_message", {
      roomId: state.roomId,
      message: message,
      messageId: messageId,
      senderId: socket.id,
      timestamp: Date.now()
    });
    
    // Clear input
    elements.chatInput.value = "";
    elements.chatInput.style.height = 'auto';
    elements.chatInputArea.style.minHeight = '80px';
    
    // Stop typing indicator
    socket.emit("typing", { roomId: state.roomId, isTyping: false });
    state.isTyping = false;
    clearTimeout(state.typingTimeout);
    
    // Play send sound
    playSound('send');
    
    // Create particle effect
    createParticleEffect(elements.sendBtn);
  }

  function appendMessage(content, type = "stranger", messageId = null) {
    const div = document.createElement("div");
    div.className = `message ${type}`;
    if (messageId) div.dataset.messageId = messageId;
    
    const messageContent = document.createElement("div");
    messageContent.textContent = content;
    messageContent.style.userSelect = 'text';
    messageContent.style.webkitUserSelect = 'text';
    messageContent.style.cursor = 'text';
    div.appendChild(messageContent);
    
    const timeDiv = document.createElement("div");
    timeDiv.className = "message-time";
    const now = new Date();
    timeDiv.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.appendChild(timeDiv);
    
    elements.messages.appendChild(div);
    
    // Auto-scroll with animation
    requestAnimationFrame(() => {
      elements.messages.scrollTo({
        top: elements.messages.scrollHeight,
        behavior: 'smooth'
      });
    });
    
    // Create particle effect for new messages
    if (type === "you") {
      createParticleEffect(div);
    }
    
    return div;
  }

  function notifyTyping() {
    if (!state.roomId || state.isTyping) return;
    
    state.isTyping = true;
    socket.emit("typing", { 
      roomId: state.roomId, 
      isTyping: true,
      userName: state.userName,
      senderId: socket.id
    });
    
    clearTimeout(state.typingTimeout);
    state.typingTimeout = setTimeout(() => {
      state.isTyping = false;
      socket.emit("typing", { 
        roomId: state.roomId, 
        isTyping: false,
        userName: state.userName,
        senderId: socket.id
      });
    }, 2000);
  }

  function clearTypingIndicator() {
    if (elements.typingIndicator) {
      elements.typingIndicator.innerHTML = "";
    }
  }

  // =========== MESSAGE HISTORY ===========
  function showMessageHistory() {
    // Clear current content
    elements.historyContent.innerHTML = '';
    
    // Add messages to history
    if (state.messageHistory.length === 0) {
      elements.historyContent.innerHTML = `
        <div style="text-align: center; color: var(--muted); padding: 40px 20px; font-size: 1.1rem;">
          <div style="font-size: 3rem; margin-bottom: 16px;">💬</div>
          No messages yet
        </div>
      `;
    } else {
      state.messageHistory.forEach(msg => {
        const div = document.createElement("div");
        div.className = `message ${msg.sender}`;
        div.style.margin = '12px 0';
        div.style.maxWidth = '100%';
        div.style.animation = 'none';
        div.style.opacity = '1';
        
        const content = document.createElement("div");
        content.textContent = msg.content;
        content.style.userSelect = 'text';
        content.style.webkitUserSelect = 'text';
        div.appendChild(content);
        
        const timeDiv = document.createElement("div");
        timeDiv.className = "message-time";
        timeDiv.textContent = msg.time;
        div.appendChild(timeDiv);
        
        elements.historyContent.appendChild(div);
      });
    }
    
    // Show history
    elements.messageHistory.classList.add('show');
    
    // Scroll to bottom
    setTimeout(() => {
      elements.historyContent.scrollTop = elements.historyContent.scrollHeight;
    }, 100);
  }

  function hideMessageHistory() {
    elements.messageHistory.classList.remove('show');
  }

  // =========== SOUND FUNCTIONS ===========
  function toggleSound() {
    state.soundEnabled = !state.soundEnabled;
    localStorage.setItem('soundEnabled', state.soundEnabled);
    
    const toggle = elements.soundToggle;
    toggle.textContent = state.soundEnabled ? '🔊' : '🔇';
    toggle.style.transform = 'scale(1.2) rotate(15deg)';
    
    setTimeout(() => {
      toggle.style.transform = '';
    }, 300);
    
    showNotification(state.soundEnabled ? 'Sound enabled' : 'Sound disabled', 'info');
    
    // Test sound
    if (state.soundEnabled) {
      playSound('notification');
    }
  }

  function updateSoundToggle() {
    if (elements.soundToggle) {
      elements.soundToggle.textContent = state.soundEnabled ? '🔊' : '🔇';
    }
  }

  function playSound(type) {
    if (!state.soundEnabled) return;
    
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      let frequency = 800;
      let duration = 0.2;
      
      switch(type) {
        case 'send':
          oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
          oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.1);
          gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
          duration = 0.2;
          break;
          
        case 'receive':
          oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
          oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.1);
          gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
          duration = 0.2;
          break;
          
        case 'notification':
          oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
          oscillator.frequency.setValueAtTime(1200, audioContext.currentTime + 0.05);
          oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
          gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
          duration = 0.15;
          break;
          
        case 'match':
          oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
          oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
          oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2);
          gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
          duration = 0.3;
          break;
      }
      
      oscillator.start();
      oscillator.stop(audioContext.currentTime + duration);
      
    } catch (error) {
      console.warn("Audio playback failed:", error);
    }
  }

  // =========== STATISTICS FUNCTIONS ===========
  function updateChatStats() {
    if (!state.sessionStartTime) return;
    
    const elapsed = Date.now() - state.sessionStartTime;
    const minutes = Math.floor(elapsed / 60000);
    const seconds = Math.floor((elapsed % 60000) / 1000);
    
    // Update DOM elements
    const statElements = {
      statMessages: state.messagesSent,
      statReceived: state.messagesReceived,
      statTime: `${minutes}m ${seconds}s`,
      statConnection: state.connectionQuality.charAt(0).toUpperCase() + state.connectionQuality.slice(1),
      statMatchType: state.isInterestMatch ? 'Interest Match' : 'Random',
      statInterests: state.currentPartnerTags.length
    };
    
    for (const [id, value] of Object.entries(statElements)) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }
  }

  function toggleStats() {
    updateChatStats();
    elements.chatStats.classList.toggle('show');
    createParticleEffect(elements.statsBtn);
  }

  // =========== CONNECTION QUALITY ===========
  function checkConnectionQuality() {
    if (!state.peerConnection || !state.isVideoMode) return;
    
    const connectionStates = ['excellent', 'good', 'fair', 'poor'];
    const currentState = state.connectionQuality;
    const currentIndex = connectionStates.indexOf(currentState);
    
    // Simulate connection quality changes (in real app, use actual metrics)
    let newIndex = currentIndex;
    const random = Math.random();
    if (random > 0.9) {
      newIndex = Math.min(connectionStates.length - 1, currentIndex + 1);
    } else if (random > 0.8) {
      newIndex = Math.max(0, currentIndex - 1);
    }
    
    const newQuality = connectionStates[newIndex];
    if (newQuality !== state.connectionQuality) {
      state.connectionQuality = newQuality;
      updateChatStats();
      
      if (newQuality === 'poor') {
        showNotification("Connection quality is poor", "warning");
      }
    }
  }

  // =========== UTILITY FUNCTIONS ===========
  function showNotification(message, type = "info") {
    const container = document.getElementById("notificationContainer");
    if (!container) return;
    
    const notification = document.createElement("div");
    notification.className = "notification";
    notification.textContent = message;
    
    // Style based on type
    switch(type) {
      case "error":
        notification.style.borderColor = "var(--danger)";
        notification.style.background = "linear-gradient(135deg, rgba(231, 76, 60, 0.15), rgba(192, 57, 43, 0.1))";
        break;
      case "success":
        notification.style.borderColor = "var(--green)";
        notification.style.background = "linear-gradient(135deg, rgba(46, 204, 113, 0.15), rgba(39, 174, 96, 0.1))";
        break;
      case "warning":
        notification.style.borderColor = "var(--orange)";
        notification.style.background = "linear-gradient(135deg, rgba(243, 156, 18, 0.15), rgba(211, 84, 0, 0.1))";
        break;
      default:
        notification.style.borderColor = "var(--border)";
        notification.style.background = "linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02))";
    }
    
    container.appendChild(notification);
    
    // Remove after delay with animation
    setTimeout(() => {
      notification.style.opacity = "0";
      notification.style.transform = "translateX(-50%) translateY(-20px) scale(0.9)";
      setTimeout(() => notification.remove(), 300);
    }, 3000);
    
    // Play sound
    if (type !== "info" && state.soundEnabled) {
      playSound('notification');
    }
  }

  function reportUser() {
    if (!state.roomId || !state.partnerId) {
      showNotification("No user to report", "warning");
      return;
    }
    
    if (confirm("Report this user for inappropriate behavior?")) {
      socket.emit("report", { 
        room: state.roomId, 
        partnerId: state.partnerId,
        reason: "User reported via button",
        timestamp: Date.now()
      });
      showNotification("User reported. Thank you!", "success");
      setTimeout(skipChat, 1000);
    }
  }

  function skipChat() {
    console.log("Skipping chat...");
    
    // Create particle effect
    createParticleEffect(elements.skipBtn);
    
    // Show skipping notification
    showNotification("Skipping to next user...", "info");
    
    // Stop matching
    stopMatching();
    
    // Cleanup video
    if (state.isVideoMode) {
      cleanupVideo();
    }
    
    // Notify server
    if (state.roomId) {
      socket.emit("skip", { 
        room: state.roomId,
        tags: state.tags,
        mode: state.mode,
        socketId: socket.id
      });
    }
    
    // Reset UI
    updateStatus("Finding new match...", "waiting");
    elements.partnerName.textContent = "Stranger";
    elements.partnerAvatar.src = "https://api.dicebear.com/7.x/thumbs/svg?seed=stranger";
    
    // Clear messages
    elements.messages.innerHTML = '';
    
    // Clear typing
    clearTypingIndicator();
    
    // Enable chat input
    elements.chatInput.disabled = false;
    elements.sendBtn.disabled = false;
    elements.chatInput.value = "";
    elements.chatInput.style.height = 'auto';
    elements.chatInputArea.style.minHeight = '80px';
    elements.chatInput.placeholder = "Type a message...";
    
    // Reset state
    state.roomId = null;
    state.partnerId = null;
    state.currentPartnerTags = [];
    state.isInterestMatch = false;
    state.isInitiator = false;
    state.partnerCountry = null;
    state.messagesSent = 0;
    state.messagesReceived = 0;
    state.sessionStartTime = Date.now();
    state.matchStartTime = Date.now();
    state.sentMessageIds.clear();
    state.receivedMessageIds.clear();
    state.messageHistory = [];
    
    // Clear video overlays
    if (state.isVideoMode) {
      elements.remoteStatus.innerHTML = `
        <div class="spinner"></div>
        <div>Finding new partner...</div>
      `;
      elements.remoteStatus.style.display = "flex";
    }
    
    // Restart matching after delay
    setTimeout(() => {
      if (!state.roomId) {
        startMatching();
      }
    }, 500);
  }

  function clearAllIntervals() {
    if (state.connectionCheckInterval) clearInterval(state.connectionCheckInterval);
    if (state.statsUpdateInterval) clearInterval(state.statsUpdateInterval);
    if (state.matchUpdateInterval) clearInterval(state.matchUpdateInterval);
  }

  // =========== SOCKET.IO HANDLERS ===========
  socket.on("connect", () => {
    console.log("Socket connected:", socket.id);
    state.socketId = socket.id;
    updateStatus("Connected to server", "connected");
    showNotification("Connected to chat server", "success");
    
    // If we were matching, restart matching
    if (!state.roomId && !state.isMatching) {
      setTimeout(() => startMatching(), 500);
    }
  });

  socket.on("connect_error", (error) => {
    console.error("Connection error:", error);
    updateStatus("Connection failed", "error");
    showNotification("Failed to connect to server. Retrying...", "error");
  });

  socket.on("online_count", ({ count }) => {
    if (elements.onlineCount) {
      elements.onlineCount.textContent = count;
    }
    if (elements.matchQueue) {
      elements.matchQueue.textContent = `${Math.max(1, Math.floor(count / 2))} in queue`;
    }
  });

  socket.on("waiting", (data) => {
    console.log("Waiting for match...", data);
    updateStatus("Finding match...", "waiting");
    
    if (elements.matchTypeDisplay) {
      elements.matchTypeDisplay.textContent = state.tags.length > 0 ? 'Interest Match' : 'Random';
    }
    
    if (elements.matchQueue && data.position) {
      elements.matchQueue.textContent = `${data.position} in queue`;
    }
  });

  socket.on("matched", async (data) => {
    console.log("Matched with partner:", data);
    
    // Stop matching
    stopMatching();
    
    // Enable chat input
    elements.chatInput.disabled = false;
    elements.sendBtn.disabled = false;
    
    // Focus input
    setTimeout(() => {
      elements.chatInput.focus();
    }, 300);
    
    // Update state
    state.roomId = data.roomId;
    state.partnerId = data.partnerId;
    state.currentPartnerTags = data.partnerTags || [];
    state.isInterestMatch = data.matchType === 'interest';
    state.isInitiator = socket.id === data.initiatorId;
    state.partnerCountry = data.partnerCountry;
    state.sessionStartTime = Date.now();
    state.videoRetryCount = 0;
    
    // Update UI
    const partnerDisplayName = data.partnerName || "Stranger";
    elements.partnerName.textContent = partnerDisplayName;
    elements.partnerAvatar.src = `https://api.dicebear.com/7.x/thumbs/svg?seed=${encodeURIComponent(data.partnerId || "stranger")}`;
    
    // Clear and show welcome message
    elements.messages.innerHTML = '';
    
    const welcomeDiv = document.createElement('div');
    welcomeDiv.className = 'welcome-banner';
    welcomeDiv.innerHTML = `
      <strong style="font-size: 1.2rem;">${state.isInterestMatch ? '🎯 Interest Match!' : '✅ Connected!'}</strong><br>
      <div style="margin: 8px 0;">${partnerDisplayName ? `You're now chatting with <strong>${partnerDisplayName}</strong>` : 'You are now connected!'}</div>
      ${state.currentPartnerTags.length > 0 ? 
        `<div style="font-size: 0.9rem; color: var(--muted);">Shared interests: ${state.currentPartnerTags.join(', ')}</div>` : 
        '<div style="font-size: 0.9rem; color: var(--muted);">Random match - start chatting!</div>'}
    `;
    elements.messages.appendChild(welcomeDiv);
    
    updateStatus("Connected", "connected");
    playSound('match');
    
    // Initialize video if needed
    if (state.isVideoMode) {
      elements.videoArea.style.display = 'flex';
      
      if (!state.localStream) {
        await initializeVideo();
      }
      
      await createPeerConnection();
      
      if (state.isInitiator) {
        const offer = await state.peerConnection.createOffer();
        await state.peerConnection.setLocalDescription(offer);
        
        socket.emit("signal", {
          room: state.roomId,
          sdp: offer,
          sender: socket.id
        });
      }
    }
    
    showNotification(`${state.isInterestMatch ? '🎯 Interest match!' : '✅ Connected!'}`, "success");
  });

  socket.on("receive_message", (data) => {
    if (data.roomId !== state.roomId || state.receivedMessageIds.has(data.messageId)) return;
    
    state.receivedMessageIds.add(data.messageId);
    
    const isSelf = data.senderId === socket.id;
    
    appendMessage(
      data.message,
      isSelf ? "you" : "stranger",
      data.messageId
    );
    
    if (!isSelf) {
      playSound("receive");
      state.messagesReceived++;
    }
    
    const timestamp = new Date();
    state.messageHistory.push({
      id: data.messageId,
      content: data.message,
      sender: isSelf ? "you" : "stranger",
      timestamp: timestamp.toISOString(),
      time: timestamp.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    });
    
    updateChatStats();
  });

  socket.on("user_typing", ({ userName, isTyping, senderId }) => {
    if (senderId === socket.id) return;
    
    if (elements.typingIndicator) {
      if (isTyping) {
        elements.typingIndicator.innerHTML = `
          <div style="display: flex; align-items: center; gap: 8px;">
            <span>${userName || 'Stranger'} is typing</span>
            <div class="typing-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        `;
      } else {
        elements.typingIndicator.innerHTML = "";
      }
    }
  });

  socket.on("partner-disconnected", () => {
    console.log("Partner disconnected");
    clearTypingIndicator();
    
    // Add disconnect message
    appendMessage("⚠️ Partner disconnected", "stranger");
    
    // Update UI
    elements.partnerName.textContent = "Stranger";
    elements.partnerAvatar.src = "https://api.dicebear.com/7.x/thumbs/svg?seed=stranger";
    
    // Update video status if in video mode
    if (state.isVideoMode) {
      elements.remoteStatus.innerHTML = `
        <div class="spinner"></div>
        <div>Partner disconnected. Finding new match...</div>
      `;
      elements.remoteStatus.style.display = "flex";
      
      // Cleanup video
      cleanupVideo();
    }
    
    showNotification("Partner disconnected", "warning");
    
    // Auto-skip after delay
    setTimeout(() => {
      if (!state.isMatching) {
        skipChat();
      }
    }, 3000);
  });

  socket.on("signal", async ({ sdp, candidate, sender }) => {
    if (sender === socket.id) return;
    
    try {
      if (sdp) {
        await handleRemoteSDP(sdp);
      }
      
      if (candidate) {
        await handleRemoteCandidate(candidate);
      }
    } catch (error) {
      console.error("Signal handling error:", error);
      showNotification("Connection error occurred", "error");
    }
  });

  // =========== INITIALIZE ===========
  document.addEventListener("DOMContentLoaded", () => {
    console.log("DOM loaded, initializing...");
    
    // Start initialization
    setTimeout(init, 100);
  });

  // Handle page unload
  window.addEventListener('beforeunload', (e) => {
    console.log("Page unloading, cleaning up...");
    cleanupVideo();
    stopMatching();
    clearAllIntervals();
    
    if (state.roomId) {
      socket.emit("skip", { room: state.roomId });
    }
  });

  // Handle page hide/show
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      console.log("Page hidden");
      // Page became hidden
      if (state.isVideoMode) {
        // Pause videos to save resources
        if (elements.remoteVideo) elements.remoteVideo.pause();
        if (elements.localVideo) elements.localVideo.pause();
      }
    } else {
      console.log("Page visible");
      // Page became visible
      if (state.isVideoMode) {
        // Resume videos
        if (elements.remoteVideo.srcObject) {
          elements.remoteVideo.play().catch(() => {});
        }
        if (elements.localVideo.srcObject) {
          elements.localVideo.play().catch(() => {});
        }
      }
    }
  });
</script>
